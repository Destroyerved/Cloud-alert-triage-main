name: cloud-alert-triage
description: Cloud alert triage environment for incident management

tasks:
  - name: easy
    description: Basic alert triage
    grader_weights:
      alert_classification_f1: 0.39
      incident_link_f1: 0.19
      false_alarm_accuracy: 0.19
      stealth_bonus: 0.23

  - name: medium
    description: Moderate alert triage with noise
    grader_weights:
      alert_classification_f1: 0.34
      incident_link_f1: 0.24
      false_alarm_accuracy: 0.19
      stealth_bonus: 0.23

  - name: hard
    description: Complex alert triage with adversarial noise
    grader_weights:
      alert_classification_f1: 0.29
      incident_link_f1: 0.29
      false_alarm_accuracy: 0.19
      stealth_bonus: 0.23

metadata:
  evaluation_metric: weighted_score
